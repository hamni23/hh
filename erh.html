        :root {
            --primary: #ff0000;
            --primary-glow: #ff4d4d;
            --primary-dark: #440000;
            --bg-dark: #000000;

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            height: 100vh;
            perspective: 2000px;
            margin: 0;
        }

        /* ----- Advanced Cyber-Space Background ----- */
        #canvas-bg {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
        }

        /* Star Layer (Large Stars) */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 10px);
            background-size: 550px 550px;
            animation: starsMove 60s linear infinite;
        }

        /* Star Layer (Small Dust) */
        .dust-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 5px);
            background-size: 350px 350px;
            animation: starsMove 100s linear infinite;
        }

        @keyframes starsMove {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* CRT Overlay Effect - Deep Red Tone */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(10, 0, 0, 0) 50%, rgba(0, 0, 0, 0.5) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(100, 0, 0, 0.02), rgba(255, 0, 0, 0.04));
            z-index: 1000;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }
        /* ----- End Cyber-Space Background ----- */

        .cyber-card {
            background: rgba(10, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 0, 0, 0.2);
            border-radius: 40px;
            box-shadow: 0 0 100px rgba(255, 0, 0, 0.2), inset 0 0 30px rgba(0, 0, 0, 1);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* Animated Red Border */
        .cyber-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--primary-dark));
            border-radius: 42px;
            z-index: -1;
            opacity: 0.5;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% { filter: brightness(1); }
            50% { filter: brightness(2); }
            100% { filter: brightness(1); }
        }

        .glitch-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px var(--primary);
            color: white;
            animation: glitchEffect 5s infinite;
        }
        @keyframes glitchEffect {
            0% { text-shadow: 0 0 20px var(--primary); }
            95% { text-shadow: 0 0 20px var(--primary); }
            96% { text-shadow: -5px -2px #00fffb, 5px 2px #ff00de; }
            97% { text-shadow: 0 0 20px var(--primary); }
            100% { text-shadow: 0 0 20px var(--primary); }
        }

        .btn-main {
            background: linear-gradient(90deg, #550000, #ff0000, #550000);
            background-size: 200% auto;
            clip-path: polygon(7% 0, 100% 0, 93% 100%, 0% 100%);
            transition: 0.5s;
            font-family: 'Orbitron', sans-serif;
            animation: moveGradient 3s linear infinite;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--primary);
            letter-spacing: 3px;
        }

        /* Password Area - Cyber Box */
        .pass-container {
            background: rgba(255, 0, 0, 0.04);
            border: 1px solid rgba(255, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-top: 25px;
            box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.1);
        }

        .status-pulse {
            width: 12px; height: 12px;
            background: #00ff00;
            border-radius: 50%;
            box-shadow: 0 0 20px #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .footer-tag {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            letter-spacing: 8px;
            color: var(--primary);
            opacity: 0.7;
        }
    </style>
</head>

    <script>
        // Particle & Neural Net System - RED Space Theme
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const maxParticles = 120;
        const maxDistance = 150;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update(xMove = 0, yMove = 0) {
                this.x += this.speedX + xMove * 0.05;
                this.y += this.speedY + yMove * 0.05;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) particles.push(new Particle());
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 0, 0, ${1 - distance / maxDistance - 0.5})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }

        let currentMouseX = 0, currentMouseY = 0;

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { 
                p.update(currentMouseX, currentMouseY); 
                p.draw(); 
            });
            drawLines();
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => { initCanvas(); createParticles(); });
        initCanvas(); createParticles(); animateParticles();

        // 3D Mouse Tilt & Background interaction
        const container = document.getElementById('container');
        const card = document.getElementById('card');
        container.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            currentMouseX = (clientX / window.innerWidth - 0.5) * 5; // تأثير خفيف للخلفية
            currentMouseY = (clientY / window.innerHeight - 0.5) * 5;
            
            const xPos = (clientX / window.innerWidth - 0.5) * 30;
            const yPos = (clientY / window.innerHeight - 0.5) * -30;
            card.style.transform = `rotateY(${xPos}deg) rotateX(${yPos}deg)`;
        });
        
        container.addEventListener('mouseleave', () => {
             card.style.transform = `rotateY(0deg) rotateX(0deg)`;
             currentMouseX = 0; currentMouseY = 0;
        });

        function copyPass() {
            const pass = "1";
            navigator.clipboard.writeText(pass);
            alert("تم نسخ رمز فك الضغط (pass : 1)");
        }
    </script>
